<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D модель с атрибутами</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#loading{
    position:absolute;
    left:10px;
    top:10px;
    background:white;
    padding:10px;
    border:1px solid #ccc;
    z-index:100;
}

#info{
    position:absolute;
    top:10px;
    right:10px;
    width:400px;
    max-height:90vh;
    overflow:auto;
    background:white;
    border:1px solid #ccc;
    padding:10px;
    z-index:100;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #ddd;
    padding:4px;
    vertical-align:top;
}

.key{
    font-weight:bold;
    width:140px;
}
</style>
</head>

<body>

<div id="loading">Загрузка модели...</div>

<div id="info">
Выберите объект на модели
</div>

<script type="module">

console.log("НОВАЯ ВЕРСИЯ INDEX.HTML");
alert("НОВАЯ ВЕРСИЯ INDEX.HTML");
    
import * as THREE from "https://unpkg.com/three@0.162.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.162.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://unpkg.com/three@0.162.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f2);

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
100000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

scene.add(
new THREE.AmbientLight(0xffffff,3)
);

const dirLight = new THREE.DirectionalLight(
0xffffff,
3
);

dirLight.position.set(
100,
100,
100
);

scene.add(dirLight);

let model = null;
let selected = null;

const loader = new GLTFLoader();

loader.load(

'model_joined.glb',

(gltf)=>{

model = gltf.scene;

scene.add(model);

let count = 0;

model.traverse(()=>{
count++;
});

const box =
new THREE.Box3().setFromObject(model);

const center =
box.getCenter(new THREE.Vector3());

const size =
box.getSize(new THREE.Vector3());

model.position.sub(center);

const maxDim =
Math.max(size.x,size.y,size.z);

camera.position.set(
maxDim,
maxDim,
maxDim
);

camera.lookAt(0,0,0);

document.getElementById('loading').innerHTML =
'✅ Модель загружена. Объектов: ' + count;

console.log(model);

},

(xhr)=>{

if(xhr.total){

const percent =
Math.round(
(xhr.loaded/xhr.total)*100
);

document.getElementById('loading').innerHTML =
'Загрузка: ' + percent + '%';

}

},

(error)=>{

document.getElementById('loading').innerHTML =
'❌ Ошибка загрузки модели';

console.error(error);

}

);

const raycaster =
new THREE.Raycaster();

const mouse =
new THREE.Vector2();

window.addEventListener('click',(event)=>{

if(!model) return;

mouse.x =
(event.clientX/window.innerWidth)*2-1;

mouse.y =
-(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(
mouse,
camera
);

const intersects =
raycaster.intersectObjects(
model.children,
true
);

if(intersects.length===0) return;

const obj =
intersects[0].object;

if(
selected &&
selected.material &&
selected.material.emissive
){
selected.material.emissive.setHex(0x000000);
}

selected = obj;

if(
obj.material &&
obj.material.emissive
){
obj.material.emissive.setHex(0xffff00);
}

let html =
'<h3>' +
(obj.name || 'Объект') +
'</h3>';

html += '<table>';

for(const key in obj.userData){

html +=
'<tr>' +
'<td class="key">'+key+'</td>' +
'<td>' +
JSON.stringify(
obj.userData[key]
) +
'</td>' +
'</tr>';

}

html += '</table>';

if(
Object.keys(obj.userData).length===0
){

html +=
'<p><b>Атрибуты не найдены у выбранного объекта.</b></p>';

}

document.getElementById('info').innerHTML =
html;

console.log(obj);
console.log(obj.userData);

});

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

function animate(){

requestAnimationFrame(
animate
);

controls.update();

renderer.render(
scene,
camera
);

}

animate();

</script>

</body>
</html>
